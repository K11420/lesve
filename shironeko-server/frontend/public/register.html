<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>新規登録 | LenovoServer</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .register-card {
            max-width: 560px;
            margin: 40px auto;
            background: rgba(10, 10, 15, 0.88);
            border: 1px solid #2a2a35;
            border-radius: 16px;
            padding: 28px 24px;
        }
        .register-title {
            font-size: 30px;
            font-weight: 700;
            text-align: center;
        }
        .register-title .highlight {
            color: #5865F2;
        }
        .register-subtitle {
            text-align: center;
            color: #9ca3af;
            margin-top: 8px;
            margin-bottom: 18px;
            font-size: 14px;
        }
        .form-grid {
            display: grid;
            gap: 10px;
        }
        .primary-btn {
            width: 100%;
            border: 1px solid rgba(99, 102, 241, 0.45);
            background: linear-gradient(135deg, #4f46e5 0%, #4338ca 100%);
            color: #fff;
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }
        .primary-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(79, 70, 229, 0.28);
        }
        .primary-btn:disabled {
            opacity: 0.48;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .error-message {
            background: #ff4444;
            color: #fff;
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 12px;
            display: none;
        }
        .error-message.show {
            display: block;
        }
        .turnstile-slot {
            margin-top: 8px;
            display: flex;
            justify-content: center;
            min-height: 0;
        }
        .security-status {
            margin-top: 8px;
            min-height: 16px;
            color: #9ca3af;
            font-size: 11px;
            text-align: center;
        }
        .security-status.warn { color: #f59e0b; }
        .security-status.error { color: #f87171; }
        .security-status.ok { color: #4ade80; }
        .terms-check {
            margin-top: 10px;
            display: flex;
            align-items: flex-start;
            gap: 8px;
            color: #cbd5e1;
            font-size: 12px;
            line-height: 1.6;
        }
        .terms-check input {
            margin-top: 2px;
        }
        .terms-check a {
            color: #93c5fd;
            text-decoration: none;
        }
        .terms-check a:hover {
            text-decoration: underline;
        }
        .links {
            margin-top: 16px;
            text-align: center;
            color: #9ca3af;
            font-size: 13px;
        }
        .links a {
            color: #93c5fd;
            text-decoration: none;
        }
        .links a:hover {
            text-decoration: underline;
        }
        @media (max-width: 768px) {
            .register-card {
                margin: 20px 14px;
                padding: 24px 16px;
            }
            .register-title {
                font-size: 26px;
            }
        }
    </style>
</head>
<body>
    <div class="register-card">
        <h1 class="register-title">Lenovo<span class="highlight">Server</span></h1>
        <p class="register-subtitle">新規登録</p>

        <div id="error-message" class="error-message"></div>
        <div class="form-grid">
            <input type="text" id="register-name" class="form-input" placeholder="表示名（任意）" maxlength="80">
            <input type="email" id="register-email" class="form-input" placeholder="メールアドレス">
            <input type="password" id="register-password" class="form-input" placeholder="パスワード（8文字以上）">
            <input type="password" id="register-password-confirm" class="form-input" placeholder="パスワード（確認）">
        </div>

        <label class="terms-check">
            <input type="checkbox" id="terms-checkbox">
            <span>
                <a href="/terms.html" target="_blank" rel="noopener noreferrer">利用規約</a>、
                <a href="/privacy.html" target="_blank" rel="noopener noreferrer">プライバシーポリシー</a>、
                <a href="/tokushoho.html" target="_blank" rel="noopener noreferrer">特定商取引法に基づく表記</a>
                を確認し、同意します。
            </span>
        </label>

        <button id="register-btn" class="primary-btn" onclick="registerWithEmail()" disabled>
            <i class="fas fa-user-plus"></i> メールで新規登録
        </button>

        <div class="links">
            既にアカウントをお持ちですか？ <a href="/auth.html">ログインへ</a><br>
            使い方が分からない場合は <a href="/reference" target="_blank" rel="noopener noreferrer">リファレンス</a>
        </div>
    </div>

    <script>
        let turnstileEnabled = false;
        let turnstileWidgetId = null;
        let turnstileScriptPromise = null;
        let turnstileSessionPromise = null;
        let turnstileSessionResolver = null;
        let turnstileSessionRejecter = null;
        let turnstileBusy = false;
        let registerBusy = false;
        let turnstileSessionId = null;

        function showError(message) {
            const errorEl = document.getElementById('error-message');
            if (!errorEl) return;
            errorEl.textContent = message;
            errorEl.classList.add('show');
        }

        function clearError() {
            const errorEl = document.getElementById('error-message');
            if (!errorEl) return;
            errorEl.textContent = '';
            errorEl.classList.remove('show');
        }

        function setTurnstileStatus(message = '', level = '') {
            const statusEl = document.getElementById('turnstile-status');
            if (!statusEl) return;
            statusEl.textContent = message;
            statusEl.className = 'security-status';
            if (level) {
                statusEl.classList.add(level);
            }
        }

        function clearTurnstileSession() {
            turnstileSessionId = null;
        }

        function setRegisterButtonEnabled(enabled, label = 'メールで新規登録') {
            const btn = document.getElementById('register-btn');
            if (!btn) return;
            btn.disabled = !enabled;
            btn.innerHTML = `<i class="fas fa-user-plus"></i> ${label}`;
        }

        function syncRegisterButtonState() {
            if (registerBusy || turnstileBusy) {
                setRegisterButtonEnabled(false, '処理中...');
                return;
            }
            setRegisterButtonEnabled(true);
        }

        function resolveTurnstileSession(sessionId) {
            turnstileSessionId = sessionId;
            if (typeof turnstileSessionResolver === 'function') {
                turnstileSessionResolver(sessionId);
            }
            turnstileSessionResolver = null;
            turnstileSessionRejecter = null;
            turnstileSessionPromise = null;
            turnstileBusy = false;
            syncRegisterButtonState();
        }

        function rejectTurnstileSession(message) {
            clearTurnstileSession();
            if (typeof turnstileSessionRejecter === 'function') {
                turnstileSessionRejecter(new Error(message));
            }
            turnstileSessionResolver = null;
            turnstileSessionRejecter = null;
            turnstileSessionPromise = null;
            turnstileBusy = false;
            syncRegisterButtonState();
        }

        async function ensureTurnstileScriptLoaded() {
            if (window.turnstile && typeof window.turnstile.render === 'function') {
                return true;
            }
            if (turnstileScriptPromise) {
                return turnstileScriptPromise;
            }

            turnstileScriptPromise = new Promise((resolve) => {
                let completed = false;
                const finish = (ok) => {
                    if (completed) return;
                    completed = true;
                    resolve(ok);
                };

                const existing = document.querySelector('script[data-turnstile-script]');
                const script = existing || document.createElement('script');
                if (!existing) {
                    script.src = 'https://challenges.cloudflare.com/turnstile/v0/api.js';
                    script.async = true;
                    script.defer = true;
                    script.setAttribute('data-turnstile-script', '1');
                    document.head.appendChild(script);
                }
                script.addEventListener('load', () => finish(true), { once: true });
                script.addEventListener('error', () => finish(false), { once: true });

                const started = Date.now();
                const watcher = setInterval(() => {
                    if (window.turnstile && typeof window.turnstile.render === 'function') {
                        clearInterval(watcher);
                        finish(true);
                        return;
                    }
                    if (Date.now() - started > 12000) {
                        clearInterval(watcher);
                        finish(false);
                    }
                }, 200);
            });

            return turnstileScriptPromise;
        }

        function renderTurnstile(siteKey) {
            if (!window.turnstile || typeof window.turnstile.render !== 'function') {
                return;
            }

            const container = document.getElementById('turnstile-widget');
            if (!container) return;
            if (turnstileWidgetId && typeof window.turnstile.remove === 'function') {
                try { window.turnstile.remove(turnstileWidgetId); } catch (e) {}
            }
            container.innerHTML = '';

            turnstileWidgetId = window.turnstile.render('#turnstile-widget', {
                sitekey: siteKey,
                theme: 'dark',
                appearance: 'interaction-only',
                execution: 'execute',
                callback: onTurnstileSuccess,
                'error-callback': onTurnstileError,
                'expired-callback': onTurnstileExpired
            });
        }

        async function onTurnstileSuccess(token) {
            setTurnstileStatus('セキュリティ確認中...', 'warn');
            try {
                const response = await fetch('/api/turnstile/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token })
                });
                const result = await response.json();
                if (result.success) {
                    setTurnstileStatus('セキュリティ確認が完了しました', 'ok');
                    resolveTurnstileSession(result.sessionId);
                } else {
                    setTurnstileStatus('セキュリティ認証に失敗しました', 'error');
                    rejectTurnstileSession('セキュリティ認証に失敗しました。再度お試しください');
                }
            } catch (e) {
                console.error('Turnstile verify error:', e);
                setTurnstileStatus('セキュリティ認証でエラーが発生しました', 'error');
                rejectTurnstileSession('セキュリティ認証でエラーが発生しました。再試行してください');
            }
        }

        function onTurnstileError() {
            setTurnstileStatus('セキュリティ認証に失敗しました', 'error');
            rejectTurnstileSession('セキュリティ認証に失敗しました。再試行してください');
        }

        function onTurnstileExpired() {
            setTurnstileStatus('セキュリティ認証の有効期限が切れました', 'warn');
            rejectTurnstileSession('セキュリティ認証の有効期限が切れました。再度お試しください');
        }

        async function ensureTurnstileSession() {
            return null;
        }

        function getRedirectTarget() {
            const params = new URLSearchParams(window.location.search);
            return params.get('redirect') || '';
        }

        function finishRegister(token) {
            localStorage.setItem('token', token);
            const redirect = getRedirectTarget();
            if (redirect && redirect.startsWith('https://')) {
                const separator = redirect.includes('?') ? '&' : '?';
                window.location.href = `${redirect}${separator}token=${token}`;
                return;
            }
            window.location.href = `/dashboard.html?token=${token}`;
        }

        async function initTurnstile() {
            // Robot認証は廃止
            turnstileEnabled = false;
            clearTurnstileSession();
            setTurnstileStatus('');
            syncRegisterButtonState();
        }

        async function registerWithEmail() {
            clearError();
            const name = String(document.getElementById('register-name')?.value || '').trim();
            const email = String(document.getElementById('register-email')?.value || '').trim();
            const password = String(document.getElementById('register-password')?.value || '');
            const confirm = String(document.getElementById('register-password-confirm')?.value || '');
            const agreed = !!document.getElementById('terms-checkbox')?.checked;

            if (!email || !password) {
                showError('メールアドレスとパスワードを入力してください');
                return;
            }
            if (password.length < 8) {
                showError('パスワードは8文字以上で入力してください');
                return;
            }
            if (password !== confirm) {
                showError('確認用パスワードが一致しません');
                return;
            }
            if (!agreed) {
                showError('利用規約等への同意が必要です');
                return;
            }

            registerBusy = true;
            syncRegisterButtonState();
            try {
                const sessionId = await ensureTurnstileSession();
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name,
                        email,
                        password,
                        sessionId: sessionId || null,
                        termsAccepted: true
                    })
                });
                const result = await response.json().catch(() => ({}));
                if (!response.ok) {
                    throw new Error(result.error || '新規登録に失敗しました');
                }
                if (!result.token) {
                    throw new Error('登録後トークンの取得に失敗しました');
                }
                finishRegister(result.token);
            } catch (error) {
                showError(error.message || '新規登録に失敗しました');
            } finally {
                clearTurnstileSession();
                registerBusy = false;
                syncRegisterButtonState();
            }
        }

        document.addEventListener('keydown', (e) => {
            const active = document.activeElement;
            if (!active) return;
            if (
                e.key === 'Enter' &&
                ['register-name', 'register-email', 'register-password', 'register-password-confirm'].includes(active.id)
            ) {
                e.preventDefault();
                registerWithEmail();
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('token');
            if (token) {
                window.location.href = '/dashboard.html';
                return;
            }
            initTurnstile();
        });
    </script>
</body>
</html>
